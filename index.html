<!doctype html>
<html lang="no">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Oslo Børs Live</title>
    <meta
      name="description"
      content="Følg utviklingen på Oslo Børs med hovedgraf, vinnere, tapere og tydelig datakildestatus."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <script type="module" src="/src/main.tsx"></script>
  </head>
  <body>
    <div id="root">
      <div
        style="
          max-width: 720px;
          margin: 48px auto;
          padding: 24px;
          border-radius: 20px;
          background: #ffffff;
          border: 1px solid rgba(15, 23, 42, 0.08);
          box-shadow: 0 18px 50px rgba(15, 23, 42, 0.08);
          font-family: Manrope, sans-serif;
          color: #0f172a;
        "
      >
        <h1 style="margin-top: 0;">Oslo Børs Live</h1>
        <p>Denne appen er laget med React, TypeScript og Vite.</p>
        <p>
          Hvis du åpner <code>index.html</code> direkte, vil ikke appen laste inn. Start den via utviklingsserver:
        </p>
        <pre style="padding: 14px; border-radius: 14px; background: #f4f7fb;">npm install
npm run dev</pre>
        <p style="margin-bottom: 0;">
          Hvis du ikke har Node.js installert, må det installeres først.
        </p>
      </div>
    </div>
  </body>
</html>
